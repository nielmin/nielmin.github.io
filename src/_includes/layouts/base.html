<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/png" href="/icons/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark">
  <title>{{ title }} | {{ site.name }}</title>
</head>

<body>

  {% include "partials/header.html" %}

  <main>
    <section>
    {% block content %}
    {% endblock %}
    </section>
  </main>
  {% include "partials/footer.html" %}

</body>

<script>
  const btn = document.getElementById('theme-toggle');

  function updateButtonIcon(theme){
    btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  }

  const initialTheme = getComputedStyle(document.documentElement).colorScheme.includes('dark') ? 'dark' : 'light';
  updateButtonIcon(initialTheme);

  btn.addEventListener('click', (e) => {
    e.preventDefault();

    const isDark = getComputedStyle(document.documentElement).colorScheme.includes('dark');
    const newTheme = isDark ? 'light' : 'dark';

    document.documentElement.style.colorScheme = newTheme;
    localStorage.setItem('theme', newTheme);

    updateButtonIcon(newTheme);
  });
</script>

</html>
