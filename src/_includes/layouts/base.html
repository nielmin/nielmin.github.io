<!DOCTYPE html>
<html lang="en">

<head>
  <link rel="stylesheet" href="/css/custom.css">
  <link rel="icon" type="image/x-icon" href="/icons/favicon.ico">
  <link rel="icon" type="image/svg+xml" href="/icons/favicon.svg">
  <link rel="icon" type="image/png" href="/icons/favicon.png">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="light dark">
  <title>{{ title }} | {{ site.name }}</title>
</head>

<body>

  {% include "partials/header.html" %}

  <main>
    <section>
    {% block content %}
    {% endblock %}
    </section>
  </main>
  {% include "partials/footer.html" %}

</body>

<script>
  const btn = document.getElementById('theme-toggle');
  
  // Target the icon classes directly (works whether they are <i> tags or converted to <svg>)
  const sunIcon = btn.querySelector('.icon-sun');
  const moonIcon = btn.querySelector('.icon-moon');

  function updateButtonIcon(theme) {
    if (theme === 'dark') {
      // In dark mode, show the Sun icon and hide the Moon
      sunIcon.classList.remove('theme-icon-hidden');
      moonIcon.classList.add('theme-icon-hidden');
    } else {
      // In light mode, show the Moon icon and hide the Sun
      moonIcon.classList.remove('theme-icon-hidden');
      sunIcon.classList.add('theme-icon-hidden');
    }
  }

  // Determine initial theme state
  const initialTheme = getComputedStyle(document.documentElement).colorScheme.includes('dark') ? 'dark' : 'light';
  updateButtonIcon(initialTheme);

  btn.addEventListener('click', (e) => {
    e.preventDefault(); // Stop the '#' link from snapping the page to the top

    const isDark = getComputedStyle(document.documentElement).colorScheme.includes('dark');
    const newTheme = isDark ? 'light' : 'dark';

    document.documentElement.style.colorScheme = newTheme;
    localStorage.setItem('theme', newTheme);

    updateButtonIcon(newTheme);
  });
</script>

</html>

{% getBundle "fontawesome" %}
