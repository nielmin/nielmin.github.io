{% extends "layouts/base.html" %}

<h2>Posts Tagged With “{{ tag }}”</h2>

{% block content %}
<div class=tag-list>
<ul>
  {% set taglist = collections[ tag ] %}
  {% for post in taglist | reverse %}
    <li>
      {{ post.date | isoDate }} //
      <a href="{{ post.url }}">{{ post.data.title }}</a>
    </li>
    {% endfor %}
</ul>
</div>

{% endblock %}
