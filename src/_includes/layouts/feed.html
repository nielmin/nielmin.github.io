{% extends "layouts/base.html" %}

{% block content %}
{% if content %}
<h3>
  As of
  <time datetime="{{ page.date | isoDate }}"data-pagefind-sort="date">{{ page.date | readableDate }}</time>, I:
</h3>
<article>
{{ content | safe }}
</article>
{% endif %}

<article>
  {% if title == "Now" %}
  <h1>Archive</h1>
  {% include "partials/now-list.html" %}
  {% else %}
  {% include "partials/post-list.html" %}
  {% endif %}
{% endblock %}
</article>
