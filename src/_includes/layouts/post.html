{% extends "layouts/base.html" %}

{% block content %}

  <p>
  <i>
  {% if modified %}
  Last Modified:
  <time datetime="{{ modified | readableDate }}" data-pagefind-sort="date">{{ modified | readableDate }}</time>
  •
  {% endif %}
  Created:
  <time datetime="{{ page.date | readableDate }}" data-pagefind-sort="date">{{ page.date | readableDate }}</time>
  </i>
  </p>

  {% if summary %}
  <blockquote>
    {{ summary }}
  </blockquote>
  {% endif %}

<article>
  {{ content | safe }}
</article>
{% endblock %}
